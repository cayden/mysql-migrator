# ============================================================
#  MySQL 跨实例数据迁移 — 配置文件 (business_gouwu)
# ============================================================

# ---------- 源库（A库）----------
source_db:
  host: "A服务器IP"
  port: 3306
  user: "root"
  password: "***"
  database: "test_db"
  charset: "utf8mb4"

# ---------- 目标库（B库）----------
target_db:
  host: "B服务器IP"
  port: 3306
  user: "root"
  password: "***"
  database: "gatest"
  charset: "utf8mb4"

# ---------- 全局设置 ----------
batch_size: 5000       # 每批 SELECT 行数
insert_batch: 500      # 每批 INSERT 行数（一条 SQL 包含的行数）
dry_run: false

# ---------- 表映射 ----------
tables:
  - source: "A库源表名"          # ← 填写 A 库对应的源表名
    target: "business_gouwu_dst"
    unique_key: "rcid"           # B 库主键
    description: "购物业务流量明细迁移"
