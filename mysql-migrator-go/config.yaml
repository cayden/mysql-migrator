# ============================================================
#  MySQL 跨实例数据迁移 — 配置文件
#  支持目标类型: MySQL (批量 INSERT) 或 Apache Doris (Stream Load)
# ============================================================

# ---------- 源库（始终是 MySQL）----------
source_db:
  host: "172.18.1.173"
  port: 13306
  user: "root"
  password: "root123456"
  database: "test_db"
  charset: "utf8mb4"

# ---------- 目标类型: mysql | doris ----------
target_type: "mysql"

# ---------- MySQL 目标（target_type=mysql 时使用）----------
target_db:
  host: "172.18.1.173"
  port: 13306
  user: "root"
  password: "root123456"
  database: "test_db"
  charset: "utf8mb4"

# ---------- Doris 目标（target_type=doris 时使用）----------
# doris:
#   host: "192.168.1.100"         # FE 地址
#   http_port: 8030               # FE HTTP 端口（默认 8030）
#   user: "root"
#   password: ""
#   database: "test_db"
#   stream_batch: 200000          # 每批 Stream Load 行数
#   max_filter_ratio: 0.0         # 脏数据容忍比例 (0~1)
#   strict_mode: false            # 严格模式（类型不匹配报错）
#   timeout: 600                  # Stream Load 超时秒数
#   label_prefix: "migrate"       # load label 前缀（幂等去重用）

# ---------- 全局设置 ----------
batch_size: 5000       # 每批 SELECT 行数 (Doris 建议 20000+)
insert_batch: 500      # MySQL 每批 INSERT 行数 (Doris 不使用)
stream_batch: 200000   # Doris 每批 Stream Load 行数 (MySQL 不使用)
dry_run: false

# ---------- 表映射列表 ----------
