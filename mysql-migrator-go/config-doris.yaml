# ============================================================
#  Doris Stream Load 配置文件示例
#  用法: ./mysql-migrator -c config-doris.yaml
# ============================================================

# ---------- 源库（MySQL）----------
source_db:
  host: "192.168.40.131"
  port: 3306
  user: "root"
  password: "your_password"
  database: "gatest"
  charset: "utf8mb4"

# ---------- 目标: Apache Doris ----------
target_type: "doris"

# ---------- Doris 连接 ----------
doris:
  host: "192.168.1.100"         # Doris FE 地址
  http_port: 8030               # FE HTTP 端口
  user: "root"
  password: ""
  database: "test_db"           # 目标库
  stream_batch: 200000          # 每批 Stream Load 行数（建议 10万-50万）
  max_filter_ratio: 0.0         # 脏数据容忍: 0=零容忍, 0.1=允许10%
  strict_mode: false            # false=自动类型推断, true=严格校验
  timeout: 600                  # 超时秒数
  label_prefix: "migrate"       # 唯一标签前缀

# ---------- 全局设置 ----------
batch_size: 50000       # Doris 场景可以开很大，源库 MySQL 扛得住就行
dry_run: false

# ---------- 表映射列表 ----------
tables:
